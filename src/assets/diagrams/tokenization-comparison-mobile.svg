<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 920" role="img" aria-labelledby="title desc">
  <title id="title">Tokenization 粒度对比手机版</title><desc id="desc">unbelievable 按字符得到十二个 token，按单词得到一个 token，按 BPE 示例得到 un、believ、able 三个 token。</desc>
  <defs><style>.bg{fill:#fbfaf6}.row{fill:#fff;stroke:#c7d3d0;stroke-width:3}.c{fill:#dff1ec;stroke:#176b61;stroke-width:2}.w{fill:#fff0dd;stroke:#c86f24;stroke-width:2}.t{font:700 30px system-ui,sans-serif;fill:#16221f}.s{font:400 25px system-ui,sans-serif;fill:#53635f}.x{font:700 27px ui-monospace,monospace;fill:#16221f}</style></defs>
  <rect class="bg" width="600" height="920" rx="28"/><text class="t" x="300" y="58" text-anchor="middle">输入：unbelievable</text>
  <rect class="row" x="35" y="95" width="530" height="245" rx="20"/><text class="t" x="65" y="142">字符</text><text class="s" x="65" y="181">词表小 · 序列长</text>
  <g transform="translate(65 212)"><rect class="c" width="66" height="52" rx="9"/><text class="x" x="33" y="36" text-anchor="middle">u</text><rect class="c" x="76" width="66" height="52" rx="9"/><text class="x" x="109" y="36" text-anchor="middle">n</text><rect class="c" x="152" width="66" height="52" rx="9"/><text class="x" x="185" y="36" text-anchor="middle">b</text><rect class="c" x="228" width="66" height="52" rx="9"/><text class="x" x="261" y="36" text-anchor="middle">e</text><rect class="c" x="304" width="66" height="52" rx="9"/><text class="x" x="337" y="36" text-anchor="middle">l</text><rect class="c" x="380" width="66" height="52" rx="9"/><text class="x" x="413" y="36" text-anchor="middle">i</text>
  <rect class="c" y="62" width="66" height="52" rx="9"/><text class="x" x="33" y="98" text-anchor="middle">e</text><rect class="c" x="76" y="62" width="66" height="52" rx="9"/><text class="x" x="109" y="98" text-anchor="middle">v</text><rect class="c" x="152" y="62" width="66" height="52" rx="9"/><text class="x" x="185" y="98" text-anchor="middle">a</text><rect class="c" x="228" y="62" width="66" height="52" rx="9"/><text class="x" x="261" y="98" text-anchor="middle">b</text><rect class="c" x="304" y="62" width="66" height="52" rx="9"/><text class="x" x="337" y="98" text-anchor="middle">l</text><rect class="c" x="380" y="62" width="66" height="52" rx="9"/><text class="x" x="413" y="98" text-anchor="middle">e</text></g>
  <rect class="row" x="35" y="365" width="530" height="205" rx="20"/><text class="t" x="65" y="412">单词</text><text class="s" x="65" y="451">序列短 · 词表巨大</text><rect class="w" x="65" y="482" width="310" height="58" rx="10"/><text class="x" x="220" y="520" text-anchor="middle">unbelievable</text>
  <rect class="row" x="35" y="595" width="530" height="280" rx="20"/><text class="t" x="65" y="642">BPE</text><text class="s" x="65" y="681">粒度折中 · 由训练语料决定</text><rect class="c" x="65" y="722" width="110" height="58" rx="10"/><text class="x" x="120" y="760" text-anchor="middle">un</text><rect class="c" x="195" y="722" width="175" height="58" rx="10"/><text class="x" x="282" y="760" text-anchor="middle">believ</text><rect class="c" x="390" y="722" width="140" height="58" rx="10"/><text class="x" x="460" y="760" text-anchor="middle">able</text><text class="s" x="65" y="831">示例：3 个子词 token</text>
</svg>
