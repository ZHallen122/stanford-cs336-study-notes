<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="480" viewBox="0 0 1120 480" role="img" aria-labelledby="title desc">
  <title id="title">Dense FFN 与 top-k Mixture of Experts 路由对比</title>
  <desc id="desc">左侧 dense FFN 让所有 token 经过同一组参数。右侧 MoE router 为每个 token 选择两个 expert，只执行被选中的 expert，再按 gate 权重合并输出。</desc>
  <style>
    .panel{fill:#f8fafc;stroke:#475569;stroke-width:2}.token{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2}.router{fill:#fef3c7;stroke:#a16207;stroke-width:2}.expert{fill:#ede9fe;stroke:#6d28d9;stroke-width:2}.out{fill:#dcfce7;stroke:#15803d;stroke-width:2}.line{fill:none;stroke:#334155;stroke-width:2.5;marker-end:url(#arrow)}.route-a{fill:none;stroke:#1d4ed8;stroke-width:3;marker-end:url(#arrow-blue)}.route-b{fill:none;stroke:#7c3aed;stroke-width:3;stroke-dasharray:8 6;marker-end:url(#arrow-purple)}.label{font:700 24px system-ui,sans-serif;fill:#0f172a}.text{font:600 18px system-ui,sans-serif;fill:#0f172a}.small{font:16px system-ui,sans-serif;fill:#334155}.center{text-anchor:middle;dominant-baseline:middle}
  </style>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#334155"/></marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#1d4ed8"/></marker>
    <marker id="arrow-purple" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#7c3aed"/></marker>
  </defs>
  <rect class="panel" x="20" y="45" width="410" height="390" rx="22"/>
  <text class="label center" x="225" y="80">Dense FFN</text>
  <rect class="token" x="65" y="135" width="120" height="60" rx="14"/><text class="text center" x="125" y="165">所有 token</text>
  <rect class="expert" x="245" y="125" width="140" height="80" rx="14"/><text class="text center" x="315" y="155">同一个 FFN</text><text class="small center" x="315" y="181">全部参数激活</text>
  <rect class="out" x="155" y="300" width="140" height="64" rx="14"/><text class="text center" x="225" y="332">输出 token</text>
  <path class="line" d="M185 165H240"/><path class="line" d="M315 210V270Q315 282 303 288L278 300"/>
  <text class="small center" x="225" y="400">固定计算路径</text>

  <rect class="panel" x="455" y="45" width="645" height="390" rx="22"/>
  <text class="label center" x="778" y="80">Top-k MoE（示例 k = 2）</text>
  <rect class="token" x="485" y="135" width="110" height="60" rx="14"/><text class="text center" x="540" y="165">一个 token</text>
  <rect class="router" x="635" y="125" width="125" height="80" rx="14"/><text class="text center" x="697" y="153">Router</text><text class="small center" x="697" y="181">打分并选 top-2</text>
  <rect class="expert" x="820" y="105" width="120" height="58" rx="14"/><text class="text center" x="880" y="134">Expert 1</text>
  <rect class="expert" x="820" y="188" width="120" height="58" rx="14"/><text class="text center" x="880" y="217">Expert 2</text>
  <rect class="expert" x="820" y="271" width="120" height="58" rx="14"/><text class="text center" x="880" y="300">Expert 3</text>
  <rect class="out" x="980" y="167" width="90" height="92" rx="14"/><text class="text center" x="1025" y="198">加权</text><text class="text center" x="1025" y="224">合并</text>
  <path class="line" d="M595 165H630"/>
  <path class="route-a" d="M760 150C785 150 785 134 815 134"/><path class="route-b" d="M760 180C785 180 785 217 815 217"/>
  <path class="line" d="M945 134C968 134 965 182 975 190"/><path class="line" d="M945 217H975"/>
  <text class="small center" x="790" y="366">未选中的 Expert 3 不执行</text>
  <text class="small center" x="778" y="400">更多总参数，但每个 token 只激活 k 个 expert</text>
</svg>
