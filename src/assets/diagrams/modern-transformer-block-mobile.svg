<svg xmlns="http://www.w3.org/2000/svg" width="600" height="1160" viewBox="0 0 600 1160" role="img" aria-labelledby="title desc">
  <title id="title">移动端现代 pre-norm Transformer block 数据流</title>
  <desc id="desc">输入形状 B T D，依次经过 RMSNorm、因果自注意力、残差相加、RMSNorm、SwiGLU 和第二次残差相加，输出形状保持 B T D。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#2f5d83" /></marker>
    <style>
      .box { fill: #f7fbff; stroke: #2f5d83; stroke-width: 3; rx: 14; }
      .norm { fill: #fff5d9; stroke: #8a6719; }
      .compute { fill: #e9f6ef; stroke: #26704a; }
      .add { fill: #f5ecff; stroke: #6f42a1; stroke-width: 3; }
      .main { fill: none; stroke: #2f5d83; stroke-width: 4; marker-end: url(#arrow); }
      .residual { fill: none; stroke: #6f42a1; stroke-width: 3; stroke-dasharray: 10 8; marker-end: url(#arrow); }
      text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; fill: #17212b; text-anchor: middle; }
      .label { font-size: 27px; font-weight: 700; }
      .shape { font-size: 22px; }
      .note { font-size: 21px; }
    </style>
  </defs>
  <rect width="600" height="1160" rx="18" fill="#ffffff" />
  <rect class="box" x="165" y="25" width="270" height="90" />
  <text class="label" x="300" y="62">输入</text><text class="shape" x="300" y="93">(B, T, D)</text>
  <rect class="box norm" x="165" y="175" width="270" height="90" />
  <text class="label" x="300" y="212">RMSNorm</text><text class="shape" x="300" y="243">逐 token</text>
  <rect class="box compute" x="135" y="325" width="330" height="120" />
  <text class="label" x="300" y="367">因果自注意力</text><text class="shape" x="300" y="400">Q, K, V + RoPE</text><text class="shape" x="300" y="428">输出 (B, T, D)</text>
  <circle class="add" cx="300" cy="520" r="40" /><text class="label" x="300" y="529">＋</text>
  <rect class="box norm" x="165" y="635" width="270" height="90" />
  <text class="label" x="300" y="672">RMSNorm</text><text class="shape" x="300" y="703">逐 token</text>
  <rect class="box compute" x="165" y="785" width="270" height="105" />
  <text class="label" x="300" y="827">SwiGLU</text><text class="shape" x="300" y="860">逐位置 D → D</text>
  <circle class="add" cx="300" cy="970" r="40" /><text class="label" x="300" y="979">＋</text>
  <rect class="box" x="145" y="1045" width="310" height="90" />
  <text class="label" x="300" y="1082">输出</text><text class="shape" x="300" y="1113">仍为 (B, T, D)</text>
  <path class="main" d="M300 115 V165" /><path class="main" d="M300 265 V315" /><path class="main" d="M300 445 V468" />
  <path class="main" d="M300 560 V625" /><path class="main" d="M300 725 V775" /><path class="main" d="M300 890 V918" /><path class="main" d="M300 1010 V1035" />
  <path class="residual" d="M165 70 H75 V520 H248" /><text class="note" x="90" y="300" transform="rotate(-90 90 300)">残差旁路</text>
  <path class="residual" d="M260 575 H75 V970 H248" /><text class="note" x="90" y="775" transform="rotate(-90 90 775)">残差旁路</text>
</svg>
