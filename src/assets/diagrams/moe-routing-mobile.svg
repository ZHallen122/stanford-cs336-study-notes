<svg xmlns="http://www.w3.org/2000/svg" width="600" height="1040" viewBox="0 0 600 1040" role="img" aria-labelledby="title desc">
  <title id="title">移动版 Dense FFN 与 top-k MoE 路由对比</title>
  <desc id="desc">上方 dense FFN 让所有 token 经过同一组参数。下方 MoE router 为 token 选择两个 expert，只执行被选中的 expert，再按 gate 权重合并。</desc>
  <style>.panel{fill:#f8fafc;stroke:#475569;stroke-width:3}.token{fill:#dbeafe;stroke:#1d4ed8;stroke-width:3}.router{fill:#fef3c7;stroke:#a16207;stroke-width:3}.expert{fill:#ede9fe;stroke:#6d28d9;stroke-width:3}.out{fill:#dcfce7;stroke:#15803d;stroke-width:3}.line{fill:none;stroke:#334155;stroke-width:3;marker-end:url(#a)}.ra{fill:none;stroke:#1d4ed8;stroke-width:4;marker-end:url(#ab)}.rb{fill:none;stroke:#7c3aed;stroke-width:4;stroke-dasharray:9 7;marker-end:url(#ap)}.label{font:700 28px system-ui,sans-serif;fill:#0f172a}.text{font:600 22px system-ui,sans-serif;fill:#0f172a}.small{font:19px system-ui,sans-serif;fill:#334155}.center{text-anchor:middle;dominant-baseline:middle}</style>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#334155"/></marker><marker id="ab" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#1d4ed8"/></marker><marker id="ap" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#7c3aed"/></marker></defs>
  <rect class="panel" x="25" y="25" width="550" height="350" rx="24"/><text class="label center" x="300" y="65">Dense FFN</text>
  <rect class="token" x="60" y="120" width="160" height="70" rx="14"/><text class="text center" x="140" y="155">所有 token</text>
  <rect class="expert" x="355" y="108" width="170" height="94" rx="14"/><text class="text center" x="440" y="142">同一个 FFN</text><text class="small center" x="440" y="176">全部参数激活</text>
  <path class="line" d="M220 155H348"/><rect class="out" x="205" y="260" width="190" height="70" rx="14"/><text class="text center" x="300" y="295">输出 token</text><path class="line" d="M440 205V224Q440 240 424 246L390 260"/>
  <rect class="panel" x="25" y="405" width="550" height="610" rx="24"/><text class="label center" x="300" y="450">Top-k MoE（k = 2）</text>
  <rect class="token" x="65" y="500" width="150" height="70" rx="14"/><text class="text center" x="140" y="535">一个 token</text><rect class="router" x="335" y="488" width="190" height="94" rx="14"/><text class="text center" x="430" y="522">Router</text><text class="small center" x="430" y="556">打分并选 top-2</text><path class="line" d="M215 535H328"/>
  <rect class="expert" x="70" y="665" width="150" height="65" rx="14"/><text class="text center" x="145" y="697">Expert 1</text><rect class="expert" x="225" y="665" width="150" height="65" rx="14"/><text class="text center" x="300" y="697">Expert 2</text><rect class="expert" x="380" y="665" width="150" height="65" rx="14"/><text class="text center" x="455" y="697">Expert 3</text>
  <path class="ra" d="M390 585C350 620 230 615 180 660"/><path class="rb" d="M430 585C410 625 340 625 320 660"/>
  <rect class="out" x="205" y="825" width="190" height="80" rx="14"/><text class="text center" x="300" y="855">加权合并</text><text class="small center" x="300" y="884">输出 shape 不变</text><path class="line" d="M145 735C145 785 230 785 255 820"/><path class="line" d="M300 735V818"/>
  <text class="small center" x="300" y="955">Expert 3 未选中，不执行</text><text class="small center" x="300" y="985">总参数多；每个 token 只激活 k 个 expert</text>
</svg>
